name: Rafraîchissement annuel

# Données à cadence ANNUELLE : les taux servis des fonds en euros sont publiés
# en janvier-février (année N-1). On rafraîchit début février pour récupérer la
# dernière année pleine. Refresh = écrase les perf existantes (≠ fill-only).
on:
  schedule:
    # 10 février, 05:00 UTC — laisse le temps aux assureurs/GVFM de publier N-1.
    - cron: "0 5 10 2 *"
  workflow_dispatch: {} # déclenchement manuel depuis l'onglet Actions

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  annual:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write # ouvrir/commenter une issue d'alerte en cas d'échec
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r scripts/requirements.txt

      # Taux servis des fonds en euros (goodvalueformoney.eu) → perf 1y/3y/5y.
      # --refresh : écrase les perf de l'an dernier par la nouvelle fenêtre
      # (années dynamiques finissant sur la dernière année publiée).
      - name: Fonds euros — taux servis (refresh)
        run: python3 scripts/scrapers/fonds-euros-enricher.py --apply --refresh

      # Rappel : le refresh des taux fonds euros au niveau CONTRAT
      # (investissement_av_contract_terms) repose sur un workflow multi-agents Claude
      # (recherche web par assureur) — PAS exécutable en CI headless. Ce step ouvre un
      # rappel annuel (idempotent) pour le rejouer à la main. Voir
      # docs/runbook-fonds-euros-contrats-refresh.md
      - name: Rappel — refresh fonds euros CONTRATS (workflow agents)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MARKER="[rappel-fonds-euros-contrats]"
          YEAR=$(date -u '+%Y')
          EXISTING=$(gh issue list --state open --search "$MARKER $YEAR in:title" --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            printf '%s\n\n%s\n\n%s\n' \
              "Les taux servis $((YEAR-1)) des fonds euros sont publiés (janv.–mars $YEAR)." \
              "Rejouer le refresh au niveau CONTRAT (table investissement_av_contract_terms) via le workflow Claude scripts/workflows/av-fonds-euros-refresh.js." \
              "Procédure complète : docs/runbook-fonds-euros-contrats-refresh.md — refermer cette issue une fois le run appliqué." \
              | gh issue create --title "$MARKER $YEAR — rejouer le refresh fonds euros par contrat" --body-file -
          fi

      # Alerte persistante si l'étape ci-dessus a échoué : commente l'issue
      # ouverte existante (pas de spam) ou en crée une.
      - name: Alerte en cas d'échec
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MARKER="[alerte-pipeline-annuel]"
          EXISTING=$(gh issue list --state open --search "$MARKER in:title" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Nouvel échec le $(date -u '+%Y-%m-%d %H:%MZ') — $RUN_URL"
          else
            printf '%s\n\n%s\n\n%s\n' \
              "Le rafraîchissement annuel (fonds euros) a échoué." \
              "Run : $RUN_URL" \
              "À investiguer puis refermer cette issue (elle sera réutilisée si l'échec se répète)." \
              | gh issue create --title "$MARKER Rafraîchissement annuel en échec" --body-file -
          fi
