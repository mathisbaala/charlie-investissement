name: Garde de classification (OpenFIGI)

# Détecte les titres vifs (actions/REIT) mal classés 'opcvm' via OpenFIGI et les
# reclasse en 'action'. Incrémental (cache investissement_figi_security_type) :
# en régime permanent, ne checke que les nouveaux ISIN. Mensuel (2e mardi).
on:
  schedule:
    # Cible : 2e mardi du mois, 05:00 UTC. Cron OU (jour-mois/jour-semaine) →
    # se déclenche tous les mardis (+ jours 8-14) ; le filtrage « 2e mardi »
    # réel est fait par une garde dans le step ci-dessous.
    - cron: "0 5 8-14 * 2"
  workflow_dispatch: {}

# Groupe de concurrence DÉDIÉ (pas data-refresh) : la garde ne lit/écrit que
# product_type + son cache, indépendamment des pipelines de cours/métriques. Un
# groupe partagé ferait annuler ce run quand un autre data-job est déclenché
# (GitHub ne garde qu'un seul run en attente par groupe).
concurrency:
  group: classify-guard
  cancel-in-progress: false

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 90 # ~37 min pour le 1er balayage complet sans clé OpenFIGI
    permissions:
      contents: read
      issues: write
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENFIGI_API_KEY: ${{ secrets.OPENFIGI_API_KEY }} # optionnel (accélère si présent)
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r scripts/requirements.txt

      - name: OpenFIGI — reclasser les titres vifs mal classés opcvm
        # Garde « 2e mardi » : neutralise le OU jour-du-mois/jour-de-semaine du
        # cron. On ne lance le balayage qu'au 2e mardi sur déclenchement planifié ;
        # le manuel (workflow_dispatch) passe toujours.
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DOW=$(date -u +%u); DOM=$(date -u +%-d)
            if [ "$DOW" != "2" ] || [ "$DOM" -lt 8 ] || [ "$DOM" -gt 14 ]; then
              echo "Planifié hors 2e mardi (jour-semaine=$DOW, jour-mois=$DOM) — skip."
              exit 0
            fi
          fi
          python3 scripts/scrapers/openfigi-classify.py --apply

      - name: Alerte en cas d'échec
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MARKER="[alerte-classification]"
          EXISTING=$(gh issue list --state open --search "$MARKER in:title" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Nouvel échec le $(date -u '+%Y-%m-%d %H:%MZ') — $RUN_URL"
          else
            printf '%s\n\n%s\n' "La garde de classification OpenFIGI a échoué." "Run : $RUN_URL" \
              | gh issue create --title "$MARKER Garde de classification en échec" --body-file -
          fi
