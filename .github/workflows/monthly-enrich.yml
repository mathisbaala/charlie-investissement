name: Enrichissement mensuel

# Comble les champs manquants une fois par mois (fill-only, sans écrasement).
# N'inclut JAMAIS les scrapers de seeding destructifs.
on:
  schedule:
    # 1er lundi du mois, 05:00 UTC : jour du mois entre 1 et 7 ET un lundi.
    - cron: "0 5 1-7 * 1"
  workflow_dispatch: {} # déclenchement manuel depuis l'onglet Actions

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: read
      issues: write # ouvrir/commenter une issue d'alerte en cas d'échec
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r scripts/requirements.txt

      - name: Pipeline mensuel (enrichissement fill-only)
        run: python3 scripts/cron/monthly-pipeline.py

      # Alerte persistante si une étape ci-dessus a échoué : commente l'issue
      # ouverte existante (pas de spam) ou en crée une. GITHUB_TOKEN intégré,
      # aucun secret externe requis.
      - name: Alerte en cas d'échec
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MARKER="[alerte-pipeline-mensuel]"
          EXISTING=$(gh issue list --state open --search "$MARKER in:title" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Nouvel échec le $(date -u '+%Y-%m-%d %H:%MZ') — $RUN_URL"
          else
            printf '%s\n\n%s\n\n%s\n' \
              "Le balayage mensuel a échoué." \
              "Run : $RUN_URL" \
              "À investiguer puis refermer cette issue (elle sera réutilisée si l'échec se répète)." \
              | gh issue create --title "$MARKER Enrichissement mensuel en échec" --body-file -
          fi
