name: Apply Morningstar OPCVM holdings (mass run)

# Job TEMPORAIRE de remplissage de masse : enrichit la ventilation
# (géo/secteur/holdings) des OPCVM via sal-service (source=morningstar),
# fill-only, priorité AUM. Sharding par offset pour tenir dans le timeout job.
# À SUPPRIMER une fois le gisement (~7980) drainé.
on:
  workflow_dispatch: {}

concurrency:
  group: ms-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    strategy:
      fail-fast: false
      max-parallel: 1          # séquentiel : chaque shard re-sélectionne le
                               # top-N encore manquant (offset 0) → idempotent,
                               # pas de chevauchement ni de trou entre shards.
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8, 9]
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MS_EMEA_USER: ${{ secrets.MS_EMEA_USER }}
      MS_EMEA_PASS: ${{ secrets.MS_EMEA_PASS }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r scripts/requirements.txt

      - name: Apply shard ${{ matrix.shard }} (top-1000 encore manquant)
        run: python3 scripts/scrapers/populate-holdings-morningstar.py --apply --limit 1000 --offset 0
