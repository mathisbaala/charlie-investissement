name: SFDR annexe — probe couverture

# Diagnostic (aucune écriture) : teste si l'on peut atteindre l'annexe SFDR
# (documenttype=398) des fonds Art 8/9 SANS kid_url Morningstar, en résolvant
# l'investmentid depuis l'ISIN via ecint. Sert à décider d'intégrer la
# résolution dans sfdr-annex-enricher (couverture 817 → milliers).
on:
  workflow_dispatch:
    inputs:
      sample:
        description: "Taille de l'échantillon"
        type: string
        default: "40"

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Installer les dépendances
        run: pip install -r scripts/requirements.txt
      - name: Probe résolution annexe SFDR
        run: python3 scripts/enrichers/sfdr-annex-resolve-probe.py --sample "${{ inputs.sample }}"
